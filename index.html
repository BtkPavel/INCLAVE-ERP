<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08090a" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="INCLAVE ERP — система управления предприятием" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="INCLAVE" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png?v=3" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png?v=3" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png?v=3" />
    <link rel="icon" href="/favicon.ico?v=3" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=3" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png?v=3" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=3" />
    <link rel="manifest" href="/manifest.webmanifest?v=3" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>INCLAVE ERP</title>
    <script>
      try {
        var t = localStorage.getItem('inclave-erp-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
          var c = t === 'light' ? '#f7f8f8' : '#08090a';
          document.querySelector('meta[name="theme-color"]').setAttribute('content', c);
          document.querySelector('meta[name="color-scheme"]').setAttribute('content', t);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
