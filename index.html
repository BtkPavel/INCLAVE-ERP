<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="theme-color" content="#08090a" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="INCLAVE ERP — система управления предприятием" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="INCLAVE" />
    <link rel="apple-touch-icon" href="/icons/inclave-180.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/inclave-120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/inclave-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/inclave-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/inclave-180.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/inclave-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/inclave-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/inclave-512.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>INCLAVE ERP</title>
    <script>
      try {
        var t = localStorage.getItem('inclave-erp-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
          var c = t === 'light' ? '#f7f8f8' : '#08090a';
          document.querySelector('meta[name="theme-color"]').setAttribute('content', c);
          document.querySelector('meta[name="color-scheme"]').setAttribute('content', t);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
